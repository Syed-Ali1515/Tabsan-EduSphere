<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EduSphere Notification</title>
</head>
<body style="margin:0;padding:0;background:#f4f7fb;font-family:Segoe UI,Arial,sans-serif;color:#1f2a3d;">
  <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="padding:24px 12px;">
    <tr>
      <td align="center">
        <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="max-width:620px;background:#ffffff;border-radius:12px;overflow:hidden;border:1px solid #dbe4f0;">
          <tr>
            <td style="padding:18px 22px;background:#1f2a3d;color:#ffffff;font-size:18px;font-weight:700;">Tabsan EduSphere</td>
          </tr>
          <tr>
            <td style="padding:20px 22px;">
              <p style="margin:0 0 10px 0;font-size:12px;color:#607089;text-transform:uppercase;letter-spacing:0.06em;">Notification Type: {{TYPE}}</p>
              <h2 style="margin:0 0 12px 0;font-size:20px;line-height:1.3;color:#1f2a3d;">{{TITLE}}</h2>
              <p style="margin:0 0 16px 0;font-size:14px;line-height:1.6;color:#2f3d55;">{{BODY}}</p>
              <p style="margin:0 0 20px 0;font-size:12px;color:#6f7f97;">Sent (UTC): {{CREATED_AT_UTC}}</p>
              <a href="{{PORTAL_URL}}" style="display:inline-block;padding:10px 16px;border-radius:8px;background:#0d6efd;color:#ffffff;text-decoration:none;font-weight:600;">Open Notifications</a>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
